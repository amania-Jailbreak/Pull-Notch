name: Release DMG

on:
    push:
        branches:
            - main
        paths:
            - "Pull Notch.xcodeproj/project.pbxproj"
            - "Pull-Notch-Info.plist"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    release:
        runs-on: macos-26

        steps:
            - name: Check out repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Detect release version or build change
              id: version
              shell: bash
              run: |
                  set -euo pipefail

                  project_file="Pull Notch.xcodeproj/project.pbxproj"
                  current_version="$(grep -m 1 'MARKETING_VERSION = ' "$project_file" | sed -E 's/.*MARKETING_VERSION = ([^;]+);/\1/')"
                  current_build="$(grep -m 1 'CURRENT_PROJECT_VERSION = ' "$project_file" | sed -E 's/.*CURRENT_PROJECT_VERSION = ([^;]+);/\1/')"

                  if [[ -z "$current_version" || -z "$current_build" ]]; then
                    echo "Could not determine MARKETING_VERSION or CURRENT_PROJECT_VERSION from $project_file" >&2
                    exit 1
                  fi

                  previous_version=""
                  previous_build=""
                  if [[ "${{ github.event_name }}" == "push" ]] && git cat-file -e "${{ github.event.before }}:$project_file" 2>/dev/null; then
                    previous_version="$(git show "${{ github.event.before }}:$project_file" | grep -m 1 'MARKETING_VERSION = ' | sed -E 's/.*MARKETING_VERSION = ([^;]+);/\1/' || true)"
                    previous_build="$(git show "${{ github.event.before }}:$project_file" | grep -m 1 'CURRENT_PROJECT_VERSION = ' | sed -E 's/.*CURRENT_PROJECT_VERSION = ([^;]+);/\1/' || true)"
                  fi

                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                    version_changed="true"
                  elif [[ -n "$previous_version" && -n "$previous_build" ]] && [[ "$previous_version" != "$current_version" || "$previous_build" != "$current_build" ]]; then
                    version_changed="true"
                  else
                    version_changed="false"
                  fi

                  tag_name="v${current_version}-build-${current_build}"

                  echo "current=$current_version" >> "$GITHUB_OUTPUT"
                  echo "current_build=$current_build" >> "$GITHUB_OUTPUT"
                  echo "previous=$previous_version" >> "$GITHUB_OUTPUT"
                  echo "previous_build=$previous_build" >> "$GITHUB_OUTPUT"
                  echo "changed=$version_changed" >> "$GITHUB_OUTPUT"
                  echo "tag=$tag_name" >> "$GITHUB_OUTPUT"

            - name: Stop when version and build did not change
              if: steps.version.outputs.changed != 'true'
              shell: bash
              run: echo "MARKETING_VERSION and CURRENT_PROJECT_VERSION did not change. Skipping release."

            - name: Ensure release tag does not already exist
              if: steps.version.outputs.changed == 'true'
              id: existing_release
              env:
                  GH_TOKEN: ${{ github.token }}
              shell: bash
              run: |
                  set -euo pipefail

                  if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Stop when release already exists
              if: steps.version.outputs.changed == 'true' && steps.existing_release.outputs.exists == 'true'
              shell: bash
              run: echo "Release ${{ steps.version.outputs.tag }} already exists. Skipping."

            - name: Select Xcode
              if: steps.version.outputs.changed == 'true' && steps.existing_release.outputs.exists != 'true'
              uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: 26.4

            - name: Import code-signing certificate
              if: steps.version.outputs.changed == 'true' && steps.existing_release.outputs.exists != 'true'
              uses: apple-actions/import-codesign-certs@v5
              with:
                  p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
                  p12-password: ${{ secrets.P12_PASSWORD }}

            - name: Archive signed app
              if: steps.version.outputs.changed == 'true' && steps.existing_release.outputs.exists != 'true'
              shell: bash
              env:
                  DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
              run: |
                  set -euo pipefail

                  xcodebuild \
                    -project "Pull Notch.xcodeproj" \
                    -scheme "Pull Notch" \
                    -configuration Release \
                    -archivePath "$RUNNER_TEMP/PullNotch.xcarchive" \
                    CODE_SIGN_STYLE=Manual \
                    DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
                    CODE_SIGN_IDENTITY="Developer ID Application" \
                    "CODE_SIGN_IDENTITY[sdk=macosx*]=Developer ID Application" \
                    PROVISIONING_PROFILE_SPECIFIER="" \
                    PROVISIONING_PROFILE="" \
                    archive

            - name: Create DMG
              if: steps.version.outputs.changed == 'true' && steps.existing_release.outputs.exists != 'true'
              id: dmg
              shell: bash
              run: |
                  set -euo pipefail

                  app_path="$RUNNER_TEMP/PullNotch.xcarchive/Products/Applications/Pull Notch.app"
                  if [[ ! -d "$app_path" ]]; then
                    echo "Built app not found at $app_path" >&2
                    exit 1
                  fi

                  mkdir -p dist/dmg-root
                  cp -R "$app_path" dist/dmg-root/
                  ln -s /Applications dist/dmg-root/Applications

                  dmg_name="Pull-Notch-${{ steps.version.outputs.current }}-${{ steps.version.outputs.current_build }}.dmg"
                  dmg_path="dist/$dmg_name"

                  hdiutil create \
                    -volname "Pull Notch" \
                    -srcfolder "dist/dmg-root" \
                    -ov \
                    -format UDZO \
                    "$dmg_path"

                  echo "path=$dmg_path" >> "$GITHUB_OUTPUT"
                  echo "name=$dmg_name" >> "$GITHUB_OUTPUT"

            - name: Package plugin framework
              if: steps.version.outputs.changed == 'true' && steps.existing_release.outputs.exists != 'true'
              id: plugin_framework
              shell: bash
              run: |
                  set -euo pipefail

                  framework_path="$RUNNER_TEMP/PullNotch.xcarchive/Products/Library/Frameworks/PullNotchPluginKit.framework"
                  if [[ ! -d "$framework_path" ]]; then
                    echo "Built framework not found at $framework_path" >&2
                    exit 1
                  fi

                  framework_name="PullNotchPluginKit-${{ steps.version.outputs.current }}-${{ steps.version.outputs.current_build }}.zip"
                  framework_zip_path="dist/$framework_name"

                  ditto -c -k --sequesterRsrc --keepParent \
                    "$framework_path" \
                    "$framework_zip_path"

                  echo "path=$framework_zip_path" >> "$GITHUB_OUTPUT"
                  echo "name=$framework_name" >> "$GITHUB_OUTPUT"

            - name: Generate release notes
              if: steps.version.outputs.changed == 'true' && steps.existing_release.outputs.exists != 'true'
              id: notes
              shell: bash
              run: |
                  set -euo pipefail

                  previous_tag="$(git tag --sort=-creatordate | grep -Fxv "${{ steps.version.outputs.tag }}" | head -n 1 || true)"
                  notes_file="dist/release-notes.md"

                  {
                    echo "## Changes"
                    echo
                    if [[ -n "$previous_tag" ]]; then
                      git log "${previous_tag}..HEAD" --pretty='- %s (%h)'
                    else
                      git log --pretty='- %s (%h)'
                    fi
                  } > "$notes_file"

                  echo "file=$notes_file" >> "$GITHUB_OUTPUT"

            - name: Create GitHub release
              if: steps.version.outputs.changed == 'true' && steps.existing_release.outputs.exists != 'true'
              env:
                  GH_TOKEN: ${{ github.token }}
              shell: bash
              run: |
                  set -euo pipefail

                  release_title="Pull Notch ${{ steps.version.outputs.current }} - ${{ steps.version.outputs.current_build }}"

                  gh release create "${{ steps.version.outputs.tag }}" \
                    "${{ steps.dmg.outputs.path }}" \
                    "${{ steps.plugin_framework.outputs.path }}" \
                    --target "${{ github.sha }}" \
                    --title "$release_title" \
                    --notes-file "${{ steps.notes.outputs.file }}"
